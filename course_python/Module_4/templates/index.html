<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <title>Дневник программиста</title>
</head>
<body>

<header class="header">

  <!-- LOGIN ICON + HOVER MENU -->
  <div class="logo-menu">
    <img src="{{ url_for('static', filename='img/login.svg') }}" 
         alt="login" 
         class="logo">
    
    <div class="logo-dropdown">
        <a href="{{ url_for('logout') }}" class="dropdown-btn">Logout</a>
        <a href="{{ url_for('delete_account') }}" class="dropdown-btn delete">Delete Account</a>
    </div>
  </div>

</header>

<main>
{% block content %}
<h1 class="main__title">Мои записи</h1>

<!-- 🔍 Search -->
<form method="GET" action="{{ url_for('index') }}" class="search-form">
    <input type="text" name="search" placeholder="Поиск..." value="{{ request.args.get('search','') }}">
    <button type="submit">🔍</button>
</form>

<ul class="cards-list">
{% for el in cards %}
<li class="card">
<a class="card__link" href="{{ url_for('card_detail', id=el.id) }}">
<img class="card__img" src="{{ url_for('static', filename='img/post_icon.png') }}" width="250" height="250" alt="post_icon">
<div class="card__text">
<h2 class="card__title">{{ el.title }}</h2>
<p class="card__subtitle">{{ el.subtitle }}</p>
</div>
</a>
</li>
{% endfor %}

<!-- CREATE CARD -->
<li class="card card--creat">
<a class="creat__link" href="{{ url_for('create') }}"></a>
</li>
</ul>

{% endblock %}
</main>

<footer></footer>

</body>
</html>
