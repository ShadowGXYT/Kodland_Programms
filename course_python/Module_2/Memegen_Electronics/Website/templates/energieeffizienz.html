<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Energieeffizienz-Rechner</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
<header>
    <h1>Energieeffizienz-Rechner</h1>
</header>

<div class="container">
    <main class="info-box">
        <form method="post">
            <label for="stromverbrauch">Stromverbrauch insgesamt (kWh):</label>
            <input type="number" id="stromverbrauch" name="stromverbrauch" step="0.1" required><br><br>

            <label for="nutzungsdauer">Nutzungsdauer (Jahre):</label>
            <input type="number" id="nutzungsdauer" name="nutzungsdauer" step="0.1" required><br><br>

            <button type="submit">Berechnen</button>
        </form>

        {% if effizienz is not none %}
            <h2>Ergebnis:</h2>
            <p>Energieeffizienz: <strong>{{ effizienz }} kWh/Jahr</strong></p>
        {% endif %}

        <a href="/" class="fact-link">⬅ Zurück zur Hauptseite</a>
    </main>
</div>
</body>
</html>
