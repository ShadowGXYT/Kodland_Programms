<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alexanders Projekt</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <header>
        <h1>Meine Projektwochen-Website</h1>
    </header>

    <div class="layout">
        <nav class="sidenav">
            <button onclick="zeigeInhalt('Homepage')">🏠 Home</button>
            <button onclick="zeigeInhalt('Minigames')">🎮 Mini-Games</button>
        </nav>

        <main id="hauptbereich">
            <section id="Homepage-content">
                <h2>Willkommen</h2>
                <p>Diese Seite wird von Python (Flask) gesteuert!</p>
            </section>

            <section id="Minigames-content" style="display:none;">
                <h2>Zahlenraten</h2>
                <input type="number" id="num-input" placeholder="Zahl">
                <button onclick="sendeZahl()">Raten</button>
                <p id="game-feedback"></p>

                <hr>
                <h2>Sudoku</h2>
                <div id="sudoku-grid"></div>
                <button onclick="ladeSudoku()">Spiel laden</button>
            </section>
        </main>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
