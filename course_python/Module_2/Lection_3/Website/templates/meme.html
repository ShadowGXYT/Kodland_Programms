
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Meme Studio</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<style>
.container{max-width:900px;margin:auto;text-align:center}
.preview{border-radius:10px;margin-top:15px}
.gallery img{width:140px;margin:5px;border-radius:8px}
.editor{background:#f4f4f4;padding:15px;border-radius:12px;margin-top:10px}
</style>

<script>
function previewText(){
 document.getElementById("ptop").innerText=document.getElementById("top").value;
 document.getElementById("pbottom").innerText=document.getElementById("bottom").value;
}
</script>

</head>
<body>
<div class="container">
<h1>🔥 Meme Studio</h1>

<form method="POST" enctype="multipart/form-data">
<div class="editor">

Vorlage:
<select name="image">
{% for img in images %}
<option value="{{img}}">{{img}}</option>
{% endfor %}
</select>

<br><br>
Eigenes Bild:
<input type="file" name="upload"><br><br>

Text oben:<br>
<input id="top" name="top" onkeyup="previewText()"><br><br>

Text unten:<br>
<input id="bottom" name="bottom" onkeyup="previewText()"><br><br>

<button>Meme generieren</button>

</div>
</form>

{% if result %}
<h2>Ergebnis</h2>
<img class="preview" src="{{ url_for('static', filename=result) }}" width="450">
<br><br>
<a href="{{ url_for('static', filename=result) }}" download><button>Download</button></a>
{% endif %}

<h2>Galerie</h2>
<div class="gallery">
{% for g in gallery %}
<a href="{{ url_for('static', filename='meme_img/'+g) }}" download>
<img src="{{ url_for('static', filename='meme_img/'+g) }}">
</a>
{% endfor %}
</div>

</div>
</body>
</html>
