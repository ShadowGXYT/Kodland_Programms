<h2>Energieeffizienz-Rechner</h2>

<form method="POST">
    <label>Personen im Haushalt:</label>
    <input type="number" name="persons" required>

    <label>Anzahl Geräte:</label>
    <input type="number" name="devices" required>

    <button type="submit">Berechnen</button>
</form>

{% if result %}
    <h3>Ergebnis: {{ result }} kWh</h3>
{% endif %}
