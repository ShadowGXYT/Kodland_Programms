<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дневник программиста</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<!-- ================= HEADER ================= -->
<header class="header">
    <div class="header-left">
        <img src="{{ url_for('static', filename='img/logo.svg') }}" alt="logo" class="logo-main">
    </div>
    <div class="header-right">
        <div class="logo-menu" id="login-menu">
            <img src="{{ url_for('static', filename='img/login.svg') }}" 
                 alt="login" 
                 class="logo" id="login-icon">

            <div class="logo-dropdown" id="login-dropdown">
                <a href="{{ url_for('logout') }}" class="dropdown-btn">Logout</a>
                <a href="{{ url_for('delete_account') }}" class="dropdown-btn delete">Delete Account</a>
            </div>
        </div>
    </div>
</header>

<!-- ================= MAIN ================= -->
<main>
    <div class="create-form">
        <h2 style="text-align:center; margin-bottom:20px;">Новая запись</h2>
        
        <!-- Optionales Icon / Bild -->
        <img class="card__img" src="{{ url_for('static', filename='img/post_icon.png') }}" width="200" height="200" alt="post_icon" style="margin:0 auto; display:block;">

        <form action="{{ url_for('form_create') }}" method="post" enctype="multipart/form-data">
            <!-- Titel -->
            <input class="form__input" type="text" name="title" placeholder="Введите заголовок" required>

            <!-- Untertitel -->
            <input class="form__input" type="text" name="subtitle" placeholder="Введите подзаголовок" required>

            <!-- Textarea -->
            <textarea class="form__text" name="text" rows="8" placeholder="Напишите что-нибудь..." required></textarea>

            <!-- Submit Button -->
            <button class="form__button">Создать</button>
        </form>
    </div>
</main>

<!-- ================= DROPDOWN SCRIPT ================= -->
<script>
const loginIcon = document.getElementById('login-icon');
const dropdown = document.getElementById('login-dropdown');

loginIcon.addEventListener('click', (e) => {
    e.stopPropagation();
    dropdown.style.display = (dropdown.style.display === 'flex') ? 'none' : 'flex';
});

document.addEventListener('click', () => {
    dropdown.style.display = 'none';
});

dropdown.addEventListener('click', (e) => {
    e.stopPropagation();
});
</script>

</body>
</html>
